<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - PractiQ</title>
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>

    <header>
        <a href="#" class="logo">PractiQ <span>| Control de Calidad</span></a>
    </header>

    <main>
        <div class="card">
            <h2>Bienvenido de nuevo</h2>
            <p class="subtitle">Ingresa tus credenciales para continuar</p>
            
            <form id="login-form">
                <div class="input-group">
                    <label for="correo">Correo Electrónico</label>
                    <input type="email" id="correo" placeholder="tu@correo.com" required>
                </div>
                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn">Ingresar a la plataforma</button>
            </form>
            
            <div class="links">
                <p>¿No tienes cuenta? <a href="register.html">Regístrate aquí</a></p>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 PractiQ. Todos los derechos reservados. <a href="/html/terminos.html" style="color:var(--text-light);">Términos de uso</a></p>
    </footer>

    <script type="module" src="/js/login.js"></script>
    <div id="admin-secret-register" style="display: none; position: fixed; top: 20%; left: 50%; transform: translateX(-50%); background: white; padding: 30px; border-radius: 20px; box-shadow: 0 20px 25px rgba(0,0,0,0.2); z-index: 1000;">
    <h2>Acceso Admin Prohibido</h2>
    <form id="admin-register-form">
        <input type="text" id="admin-nombre" placeholder="Nombre Admin" required><br>
        <input type="email" id="admin-correo" placeholder="Correo" required><br>
        <input type="password" id="admin-password" placeholder="Contraseña" required><br>
        <button type="submit">Crear Cuenta Admin</button>
        <button type="button" onclick="document.getElementById('admin-secret-register').style.display='none'">Cancelar</button>
    </form>
</div>
</body>
</html>
