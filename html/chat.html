<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat | PractiQ</title>

    <link rel="stylesheet" href="./../css/chat.css?v=2">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
</head>

<body>

    <div class="chat-container">

        <!-- SIDEBAR -->
        <aside class="sidebar">

            <h2>Contactos</h2>

            <div id="lista-contactos"></div>

        </aside>

        <!-- CHAT -->
        <main class="chat-main">

            <header class="chat-header">

                <button id="btn-volver" class="btn-back">
                    <i class="bx bx-arrow-back"></i>
                </button>

                <h3 id="chat-title">Selecciona un chat</h3>

            </header>

            <div id="mensajes-container" class="mensajes-area"></div>

            <form id="form-enviar" class="input-area">

                <input
                    type="text"
                    id="input-mensaje"
                    placeholder="Escribe un mensaje..."
                    required
                    autocomplete="off"
                >

                <button type="submit">
                    <i class="bx bx-send"></i>
                </button>

            </form>

        </main>

    </div>

    <script type="module" src="./../js/chat.js"></script>

</body>

</html>
