<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>IA Biblioteca | PractiQ</title>

    <link rel="stylesheet" href="../css/chat-ia.css">
</head>

<body>

<div class="chat">

    <div id="messages"></div>

    <div class="input">
        <input id="input" placeholder="Pregunta a la IA...">
        <button id="send">Enviar</button>
    </div>

</div>

<script type="module">
import { preguntarIA } from "../js/ia-chat.js";

const input = document.getElementById("input");
const messages = document.getElementById("messages");

function addMsg(text, type){
    const div = document.createElement("div");
    div.className = type;
    div.innerText = text;
    messages.appendChild(div);
}

document.getElementById("send").onclick = () => {

    const text = input.value;
    if(!text) return;

    addMsg(text,"user");

    const res = preguntarIA(text);

    setTimeout(()=>{
        addMsg(res.content,"bot");
    },500);

    input.value = "";

};

</script>

</body>

</html>
