<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | PractiQ</title>
    <link rel="stylesheet" href="../css/lider.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>

    <header>
        <a href="lider.html" class="logo">PractiQ <span>| Gestión</span></a>
        <div class="user-menu">
            <button onclick="window.location.href='lider.html'" class="logout-btn" style="background:#E2E8F0; color:var(--text-dark)">
                <i class='bx bx-arrow-back'></i> Volver
            </button>
        </div>
    </header>

    <main>
        <div class="welcome-section">
            <h1 class="fade-in" id="dashboard-title">Cargando...</h1>
            <p class="fade-in delay-1" id="dashboard-subtitle">Obteniendo métricas del sistema...</p>
        </div>

        <div class="dashboard-grid">
            <div class="card fade-in delay-2">
                <div class="card-icon" style="background: rgba(59, 130, 246, 0.1); color: #3B82F6;"><i class='bx bx-group'></i></div>
                <h3 id="count-practicantes">0</h3>
                <p>Practicantes Activos</p>
            </div>

            <div class="card fade-in delay-3">
                <div class="card-icon" style="background: rgba(16, 185, 129, 0.1); color: #10B981;"><i class='bx bx-check-circle'></i></div>
                <h3 id="count-tareas">0</h3>
                <p>Tareas Completadas</p>
            </div>

            <div class="card fade-in delay-4">
                <div class="card-icon" style="background: rgba(245, 158, 11, 0.1); color: #F59E0B;"><i class='bx bx-time-five'></i></div>
                <h3 id="count-pendientes">0</h3>
                <p>Tareas Pendientes</p>
            </div>

            <div class="card fade-in delay-5">
                <div class="card-icon" style="background: rgba(79, 70, 229, 0.1); color: #4F46E5;"><i class='bx bx-trending-up'></i></div>
                <h3 id="porcentaje-eficiencia">0%</h3>
                <p>Nivel de Eficiencia</p>
            </div>
        </div>
    </main>

    <script type="module" src="../js/dashboard.js"></script>
</body>
</html>
